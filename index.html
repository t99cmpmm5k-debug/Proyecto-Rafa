<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020811">
  <title>Corredor Sólido · V50 Motor Visual</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="screen-header">
      <div>
        <span class="eyebrow">CORREDOR SÓLIDO</span>
        <h1>Plan</h1>
        <p>Mapa de tu preparación</p>
      </div>

      <button id="addButton" class="add-button" type="button" aria-label="Abrir acciones">
        <span></span><span></span>
      </button>
    </header>

    <section class="expedition" aria-label="Mapa semanal de entrenamiento">
      <div class="aurora aurora-one"></div>
      <div class="aurora aurora-two"></div>
      <div class="stars" aria-hidden="true"></div>

      <header class="week-status">
        <div class="week-copy">
          <strong>SEMANA 30</strong>
          <span>20–26 JUL</span>
        </div>

        <div class="progress-ring" id="progressRing" style="--progress:43">
          <div class="progress-ring__inner">
            <strong id="progressValue">43%</strong>
            <span>completado</span>
          </div>
        </div>

        <div class="session-count">
          <strong id="sessionCount">3/7</strong>
          <span>sesiones</span>
        </div>
      </header>

      <div class="mountain-layer mountain-back" aria-hidden="true">
        <svg viewBox="0 0 1200 420" preserveAspectRatio="none">
          <path d="M0 345L120 245L210 310L355 125L485 302L620 185L740 286L900 112L1200 350V420H0Z"/>
        </svg>
      </div>

      <div class="mountain-layer mountain-mid" aria-hidden="true">
        <svg viewBox="0 0 1200 420" preserveAspectRatio="none">
          <path d="M0 365L170 232L315 325L455 170L585 332L735 210L875 319L1040 185L1200 330V420H0Z"/>
        </svg>
      </div>

      <div class="mountain-layer mountain-front" aria-hidden="true">
        <svg viewBox="0 0 1200 420" preserveAspectRatio="none">
          <path d="M0 390L155 296L285 356L440 238L590 370L745 275L900 360L1050 255L1200 348V420H0Z"/>
        </svg>
      </div>

      <div class="route-stage">
        <svg class="route-svg" viewBox="0 0 1000 360" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="routeGradient" x1="0" x2="1">
              <stop offset="0%" stop-color="#28e6b1"/>
              <stop offset="36%" stop-color="#25eaff"/>
              <stop offset="69%" stop-color="#7b65ff"/>
              <stop offset="100%" stop-color="#ffb52b"/>
            </linearGradient>

            <filter id="routeGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="7" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <path
            id="routeBase"
            class="route-base"
            d="M40 245 C120 215, 145 95, 245 125 S355 290, 455 225 S545 75, 650 115 S770 285, 960 210"
          />

          <path
            id="routeProgress"
            class="route-progress"
            d="M40 245 C120 215, 145 95, 245 125 S355 290, 455 225 S545 75, 650 115 S770 285, 960 210"
          />
        </svg>

        <div id="nodesLayer" class="nodes-layer"></div>
      </div>

      <section id="sessionPanel" class="session-panel" aria-live="polite"></section>
    </section>

    <section class="demo-controls" aria-label="Controles de demostración">
      <button id="previousProgress" type="button">− Progreso</button>
      <button id="nextProgress" type="button">+ Progreso</button>
      <span>Solo para probar la animación</span>
    </section>
  </main>

  <div id="actionSheetBackdrop" class="action-sheet-backdrop" hidden></div>

  <aside id="actionSheet" class="action-sheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-heading">
      <span class="eyebrow">NUEVA EXPEDICIÓN</span>
      <h2>¿Qué quieres hacer?</h2>
    </div>

    <button type="button"><i>⇧</i><span><strong>Importar plan</strong><small>PDF, Excel, imagen o Word</small></span></button>
    <button type="button"><i>＋</i><span><strong>Crear sesión</strong><small>Añadir entrenamiento manualmente</small></span></button>
    <button type="button"><i>▣</i><span><strong>Duplicar semana</strong><small>Usar la semana anterior como base</small></span></button>
    <button type="button"><i>⌾</i><span><strong>Leer captura</strong><small>Extraer sesiones desde una imagen</small></span></button>
  </aside>

  <script src="app.js"></script>
</body>
</html>
